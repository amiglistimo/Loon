name: "YouTube 强制中文字幕"
description: "强制 YouTube 默认输出简体中文字幕"

scriptings:
- http_request:
    name: 字幕清理
    match: ^https://www\.youtube\.com/api/timedtext\?.*_ytzhsub=1
    script_url: https://raw.githubusercontent.com/ZenmoFeiShi/Qx/refs/heads/main/yt-sub-clean.js
    body_required: false
    binary_body: false
- http_response:
    name: 强制简体中文字幕
    match: ^https://www\.youtube\.com/api/timedtext\?
    script_url: https://raw.githubusercontent.com/ZenmoFeiShi/Qx/refs/heads/main/yt-zh-sub.js
    body_required: true
    binary_body: false

mitm:
  hostnames:
    includes:
    - www.youtube.com
